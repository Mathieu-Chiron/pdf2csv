<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Tests — Invoice Processor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:14px;padding:2rem;}
h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.sub{color:#6b6b6b;margin-bottom:2rem;font-size:13px;}
h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b6b6b;margin:2rem 0 .75rem;}
.suite{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;overflow:hidden;margin-bottom:1.5rem;}
.suite-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.06);}
.suite-name{font-weight:500;font-size:14px;}
.suite-score{font-size:12px;color:#6b6b6b;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px 16px;text-align:left;color:#9b9b9b;font-weight:500;background:#fafaf8;border-bottom:1px solid rgba(0,0,0,.06);}
td{padding:8px 16px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:top;}
tr:last-child td{border-bottom:none;}
.pass{color:#085041;background:#E1F5EE;}
.fail{color:#791F1F;background:#FCEBEB;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.input{color:#555;font-family:monospace;}
.expected{color:#085041;font-family:monospace;}
.got{font-family:monospace;}
.got.ok{color:#085041;}
.got.ko{color:#c0392b;}
.summary{margin-top:2rem;padding:14px 18px;background:#fff;border-radius:10px;border:1px solid rgba(0,0,0,.08);display:flex;gap:24px;align-items:center;}
.sum-n{font-size:24px;font-weight:600;}
.sum-l{font-size:11px;color:#6b6b6b;margin-top:2px;}
</style>
</head>
<body>
<h1>Tests — Invoice Processor</h1>
<div class="sub">Validation des fonctions d'extraction et de normalisation pour tous les champs.</div>
<div id="root"></div>

<script>
/* ══ COPY OF CORE FUNCTIONS FROM invoice-processor ══ */

function normalizeDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [,m,d]=s.split('-').map(Number);
    return (m<1||m>12||d<1||d>31)?null:s;
  }
  const dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if (dmy) {
    const [,dd,mm,yyyy]=dmy;
    if (parseInt(mm)>12||parseInt(dd)>31) return null;
    return `${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  }
  const MO={jan:1,fév:2,fev:2,feb:2,mar:3,avr:4,apr:4,mai:5,may:5,jun:6,jui:6,jul:7,aoû:8,aou:8,aug:8,sep:9,oct:10,nov:11,déc:12,dec:12,january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  const t1=s.match(/^(\d{1,2})\s+([a-zéûôèA-Z]+)\.?\s+(\d{4})$/i);
  if (t1){const k=t1[2].toLowerCase();const m=MO[k]||MO[k.slice(0,3)];if(m) return `${t1[3]}-${String(m).padStart(2,'0')}-${t1[1].padStart(2,'0')}`;}
  const t2=s.match(/^([a-zA-Z]+)\s+(\d{1,2}),?\s+(\d{4})$/i);
  if (t2){const k=t2[1].toLowerCase();const m=MO[k]||MO[k.slice(0,3)];if(m) return `${t2[3]}-${String(m).padStart(2,'0')}-${t2[2].padStart(2,'0')}`;}
  const ts=s.match(/^(\d{4}-\d{2}-\d{2})T/);
  if (ts) return ts[1];
  return null;
}

function normalizeAmount(raw) {
  if (raw==null||raw==='') return null;
  let s=String(raw).trim();
  s=s.replace(/\b(EUR|USD|GBP|CHF|JPY)\b/gi,'').replace(/[€$£¥]/g,'').replace(/\s*[eE]\s*$/,'').trim();
  s=s.replace(/(\d)[\s\u00A0](\d)/g,'$1$2').replace(/(\d)[\s\u00A0](\d)/g,'$1$2').trim();
  if (!s) return null;
  const D=(s.match(/\./g)||[]).length, C=(s.match(/,/g)||[]).length;
  const pf=v=>{ const n=parseFloat(v); return isNaN(n)?null:n; };
  if(!D&&!C) return pf(s);
  if(!D&&C===1) return pf(s.replace(',','.'));
  if(!C&&D===1) return pf(s);
  if(!C&&D>1) return pf(s.replace(/\./g,''));
  if(D>1&&C===1) return pf(s.replace(/\./g,'').replace(',','.'));
  if(C>1&&D===1) return pf(s.replace(/,/g,''));
  if(D===1&&C===1){ return s.lastIndexOf(',')>s.lastIndexOf('.') ? pf(s.replace('.','').replace(',','.')) : pf(s.replace(',','')); }
  return pf(s.replace(',','.'));
}

function parseJSON(raw) {
  if (!raw||typeof raw!=='string') return {ok:false,data:{},err:'Réponse vide'};
  let t=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/,'');
  const m=t.match(/\{[\s\S]*\}/);
  if (!m) return {ok:false,data:{},err:'Aucun JSON trouvé'};
  try { return {ok:true,data:JSON.parse(m[0])}; }
  catch(e) {
    try { return {ok:true,data:JSON.parse(m[0].replace(/,\s*([}\]])/g,'$1')),repaired:true}; }
    catch(e2) { return {ok:false,data:{},err:'JSON invalide'}; }
  }
}

/* ══ TEST ENGINE ══ */

let totalPass=0, totalFail=0;

function eq(a, b) {
  return JSON.stringify(a) === JSON.stringify(b);
}

function runSuite(name, cases) {
  let pass=0, fail=0;
  const rows = cases.map(({desc, input, expected, fn}) => {
    const got = fn(input);
    const ok = eq(got, expected);
    if (ok) { pass++; totalPass++; } else { totalFail++; }
    return `<tr>
      <td>${desc}</td>
      <td class="input">${JSON.stringify(input)}</td>
      <td class="expected">${JSON.stringify(expected)}</td>
      <td class="got ${ok?'ok':'ko'}">${JSON.stringify(got)}</td>
      <td><span class="badge ${ok?'pass':'fail'}">${ok?'✓ PASS':'✗ FAIL'}</span></td>
    </tr>`;
  }).join('');

  return `<div class="suite">
    <div class="suite-head">
      <span class="suite-name">${name}</span>
      <span class="suite-score">${pass} / ${pass+fail} passed</span>
    </div>
    <table>
      <thead><tr><th>Description</th><th>Entrée</th><th>Attendu</th><th>Obtenu</th><th>Résultat</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ══ TEST SUITES ══ */

const html = [];

html.push('<h2>normalizeDate — invoice_date / invoice_due_date</h2>');
html.push(runSuite('Formats de dates', [
  {desc:'ISO déjà correct',              input:'2024-03-15',           expected:'2024-03-15',  fn:normalizeDate},
  {desc:'DD/MM/YYYY (fr)',               input:'15/03/2024',           expected:'2024-03-15',  fn:normalizeDate},
  {desc:'DD-MM-YYYY',                    input:'15-03-2024',           expected:'2024-03-15',  fn:normalizeDate},
  {desc:'DD.MM.YYYY',                    input:'15.03.2024',           expected:'2024-03-15',  fn:normalizeDate},
  {desc:'D/M/YYYY (sans zéro)',          input:'5/3/2024',             expected:'2024-03-05',  fn:normalizeDate},
  {desc:'15 mars 2024 (fr)',             input:'15 mars 2024',         expected:'2024-03-15',  fn:normalizeDate},
  {desc:'15 fév. 2024 (abrégé fr)',      input:'15 fév. 2024',         expected:'2024-02-15',  fn:normalizeDate},
  {desc:'15 janvier 2024',               input:'15 janvier 2024',      expected:'2024-01-15',  fn:normalizeDate},
  {desc:'March 15, 2024 (en)',           input:'March 15, 2024',       expected:'2024-03-15',  fn:normalizeDate},
  {desc:'March 15 2024 (sans virgule)',  input:'March 15 2024',        expected:'2024-03-15',  fn:normalizeDate},
  {desc:'15 February 2024',             input:'15 February 2024',     expected:'2024-02-15',  fn:normalizeDate},
  {desc:'ISO datetime (tronqué)',        input:'2024-03-15T12:00:00Z', expected:'2024-03-15',  fn:normalizeDate},
  {desc:'Null / vide',                   input:'',                     expected:null,          fn:normalizeDate},
  {desc:'Valeur invalide',               input:'pas une date',         expected:null,          fn:normalizeDate},
  {desc:'Mois > 12 invalide',            input:'15/13/2024',           expected:null,          fn:normalizeDate},
]));

html.push('<h2>normalizeAmount — amount_ttc / invoice_total_amount_inc_vat / invoice_open_amount_inc_vat</h2>');
html.push(runSuite('Formats de montants', [
  {desc:'Entier simple',                 input:'1500',                 expected:1500,          fn:normalizeAmount},
  {desc:'Décimal point (en)',            input:'1500.50',              expected:1500.50,        fn:normalizeAmount},
  {desc:'Décimal virgule (fr)',          input:'1500,50',              expected:1500.50,        fn:normalizeAmount},
  {desc:'Milliers point, décimal virgule',input:'1.500,50',            expected:1500.50,        fn:normalizeAmount},
  {desc:'Milliers virgule, décimal point',input:'1,500.50',            expected:1500.50,        fn:normalizeAmount},
  {desc:'Milliers espace (fr)',          input:'1 500,50',             expected:1500.50,        fn:normalizeAmount},
  {desc:'Milliers espace insécable',     input:'1\u00A0500,50',        expected:1500.50,        fn:normalizeAmount},
  {desc:'Symbole € suffixe',             input:'1 500,50 €',           expected:1500.50,        fn:normalizeAmount},
  {desc:'Symbole € préfixe',             input:'€1500.50',             expected:1500.50,        fn:normalizeAmount},
  {desc:'Symbole $ USD',                 input:'$1,500.00',            expected:1500.00,        fn:normalizeAmount},
  {desc:'Libellé EUR',                   input:'1500.50 EUR',          expected:1500.50,        fn:normalizeAmount},
  {desc:'Libellé GBP',                   input:'GBP 1500.50',          expected:1500.50,        fn:normalizeAmount},
  {desc:'Zéro',                          input:'0',                    expected:0,             fn:normalizeAmount},
  {desc:'Vide',                          input:'',                     expected:null,          fn:normalizeAmount},
  {desc:'Null',                          input:null,                   expected:null,          fn:normalizeAmount},
  {desc:'Texte non numérique',           input:'N/A',                  expected:null,          fn:normalizeAmount},
]));

html.push('<h2>parseJSON — robustesse de la réponse Claude</h2>');
html.push(runSuite('Parsing JSON', [
  {desc:'JSON propre',
    input:'{"debtor_company_name":"ACME","invoice_number":"F-001"}',
    expected:{ok:true, data:{debtor_company_name:'ACME',invoice_number:'F-001'}},
    fn:r=>{const p=parseJSON(r);return {ok:p.ok,data:p.data};}},
  {desc:'JSON avec backticks markdown',
    input:'```json\n{"debtor_company_name":"ACME"}\n```',
    expected:{ok:true, data:{debtor_company_name:'ACME'}},
    fn:r=>{const p=parseJSON(r);return {ok:p.ok,data:p.data};}},
  {desc:'JSON avec texte autour',
    input:'Voici le résultat :\n{"debtor_company_name":"ACME"}\nMerci.',
    expected:{ok:true, data:{debtor_company_name:'ACME'}},
    fn:r=>{const p=parseJSON(r);return {ok:p.ok,data:p.data};}},
  {desc:'JSON avec virgule finale (réparé)',
    input:'{"debtor_company_name":"ACME","invoice_number":"F-001",}',
    expected:{ok:true, data:{debtor_company_name:'ACME',invoice_number:'F-001'}},
    fn:r=>{const p=parseJSON(r);return {ok:p.ok,data:p.data};}},
  {desc:'Réponse vide',
    input:'',
    expected:{ok:false},
    fn:r=>{const p=parseJSON(r);return {ok:p.ok};}},
  {desc:'Pas de JSON',
    input:'Désolé, je ne peux pas extraire ces données.',
    expected:{ok:false},
    fn:r=>{const p=parseJSON(r);return {ok:p.ok};}},
]));

html.push('<h2>Champs texte — debtor_company_name / debtor_post_street_1 / debtor_post_city / debtor_post_country_code / invoice_number</h2>');
html.push(runSuite('Extraction champs texte (simulation)', [
  {desc:'Nom société standard',          input:'Société ACME SAS',      expected:'Société ACME SAS',  fn:v=>v},
  {desc:'Nom avec caractères spéciaux',  input:'L\'Agence & Co.',        expected:'L\'Agence & Co.',   fn:v=>v},
  {desc:'Adresse complète',              input:'12 rue de la Paix',      expected:'12 rue de la Paix', fn:v=>v},
  {desc:'N° de facture alphanum',        input:'F-2024-001',             expected:'F-2024-001',        fn:v=>v},
  {desc:'N° de facture numérique',       input:'20240315-42',            expected:'20240315-42',       fn:v=>v},
  {desc:'Code pays ISO 2 lettres',       input:'FR',                     expected:'FR',                fn:v=>v},
  {desc:'Code pays ISO 3 lettres',       input:'FRA',                    expected:'FRA',               fn:v=>v},
  {desc:'Pays en toutes lettres',        input:'France',                 expected:'France',            fn:v=>v},
]));

html.push('<h2>Code postal — debtor_post_postalcode</h2>');
html.push(runSuite('Formats code postal', [
  {desc:'Code postal FR (5 chiffres)',        input:'75001',    expected:'75001',    fn:v=>String(v)},
  {desc:'Code postal FR avec zéro initial',  input:'01000',    expected:'01000',    fn:v=>String(v)},
  {desc:'Code postal UK (alphanum)',          input:'SW1A 1AA', expected:'SW1A 1AA', fn:v=>String(v)},
  {desc:'Code postal US (ZIP)',               input:'10001',    expected:'10001',    fn:v=>String(v)},
  {desc:'Code postal BE',                     input:'1000',     expected:'1000',     fn:v=>String(v)},
  {desc:'Code postal CH',                     input:'1200',     expected:'1200',     fn:v=>String(v)},
]));

document.getElementById('root').innerHTML = html.join('') +
  `<div class="summary">
    <div><div class="sum-n" style="color:#085041;">${totalPass}</div><div class="sum-l">Tests passés</div></div>
    <div><div class="sum-n" style="color:${totalFail>0?'#c0392b':'#085041'};">${totalFail}</div><div class="sum-l">Tests échoués</div></div>
    <div><div class="sum-n">${totalPass+totalFail}</div><div class="sum-l">Total</div></div>
  </div>`;
</script>
</body>
</html>
