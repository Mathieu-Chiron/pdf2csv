/* ══ COPY OF CORE FUNCTIONS FROM invoice-processor ══ */

function normalizeDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [,m,d]=s.split('-').map(Number);
    return (m<1||m>12||d<1||d>31)?null:s;
  }
  const dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if (dmy) {
    const [,dd,mm,yyyy]=dmy;
    if (parseInt(mm)>12||parseInt(dd)>31) return null;
    return `${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
  }
  const MO={jan:1,fév:2,fev:2,feb:2,mar:3,avr:4,apr:4,mai:5,may:5,jun:6,jui:6,jul:7,aoû:8,aou:8,aug:8,sep:9,oct:10,nov:11,déc:12,dec:12,january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  const t1=s.match(/^(\d{1,2})\s+([a-zéûôèA-Z]+)\.?\s+(\d{4})$/i);
  if (t1){const k=t1[2].toLowerCase();const m=MO[k]||MO[k.slice(0,3)];if(m) return `${t1[3]}-${String(m).padStart(2,'0')}-${t1[1].padStart(2,'0')}`;}
  const t2=s.match(/^([a-zA-Z]+)\s+(\d{1,2}),?\s+(\d{4})$/i);
  if (t2){const k=t2[1].toLowerCase();const m=MO[k]||MO[k.slice(0,3)];if(m) return `${t2[3]}-${String(m).padStart(2,'0')}-${t2[2].padStart(2,'0')}`;}
  const ts=s.match(/^(\d{4}-\d{2}-\d{2})T/);
  if (ts) return ts[1];
  return null;
}

function normalizeAmount(raw) {
  if (raw==null||raw==='') return null;
  let s=String(raw).trim();
  s=s.replace(/\b(EUR|USD|GBP|CHF|JPY)\b/gi,'').replace(/[€$£¥]/g,'').replace(/\s*[eE]\s*$/,'').trim();
  s=s.replace(/(\d)[\s\u00A0](\d)/g,'$1$2').replace(/(\d)[\s\u00A0](\d)/g,'$1$2').trim();
  if (!s) return null;
  const D=(s.match(/\./g)||[]).length, C=(s.match(/,/g)||[]).length;
  const pf=v=>{ const n=parseFloat(v); return isNaN(n)?null:n; };
  if(!D&&!C) return pf(s);
  if(!D&&C===1) return pf(s.replace(',','.'));
  if(!C&&D===1) return pf(s);
  if(!C&&D>1) return pf(s.replace(/\./g,''));
  if(D>1&&C===1) return pf(s.replace(/\./g,'').replace(',','.'));
  if(C>1&&D===1) return pf(s.replace(/,/g,''));
  if(D===1&&C===1){ return s.lastIndexOf(',')>s.lastIndexOf('.') ? pf(s.replace('.','').replace(',','.')) : pf(s.replace(',','')); }
  return pf(s.replace(',','.'));
}

function parseJSON(raw) {
  if (!raw||typeof raw!=='string') return {ok:false,data:{},err:'Réponse vide'};
  let t=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/,'');
  const m=t.match(/\{[\s\S]*\}/);
  if (!m) return {ok:false,data:{},err:'Aucun JSON trouvé'};
  try { return {ok:true,data:JSON.parse(m[0])}; }
  catch(e) {
    try { return {ok:true,data:JSON.parse(m[0].replace(/,\s*([}\]])/g,'$1')),repaired:true}; }
    catch(e2) { return {ok:false,data:{},err:'JSON invalide'}; }
  }
}

function vandn(value, f) {
  const errs=[], empty=value==null||String(value).trim()==='';
  if (f.required&&empty) return {valid:false,norm:value,errs:['Champ requis']};
  if (empty) return {valid:true,norm:value,errs:[]};
  let norm=value;
  if (f.type==='date') {
    norm=normalizeDate(value);
    if (!norm) errs.push(`Date non reconnue : "${value}"`);
    else { const d=new Date(norm); if(isNaN(d.getTime())) errs.push('Date invalide'); if(d.getFullYear()<2000||d.getFullYear()>2099) errs.push('Année hors plage'); }
  }
  if (f.type==='number') {
    norm=normalizeAmount(value);
    if (norm==null) errs.push(`Montant non reconnu : "${value}"`);
    else { if(norm<0) errs.push('Montant négatif'); if(norm>10_000_000) errs.push('Montant > 10M€'); }
  }
  if (f.type==='text'&&String(value).length>500) errs.push('Valeur trop longue');
  return {valid:errs.length===0,norm:norm??value,errs};
}

function simulateValidation(invoiceData, fields) {
  const errors={};let ok=true;
  fields.forEach(f=>{
    const v=invoiceData[f.key],res=vandn(v,f);
    if(!res.valid){errors[f.key]=res.errs[0];ok=false;}
  });
  return {ok, errors};
}

function allDone(invoices) {
  return invoices.length>0&&invoices.every(x=>x.status==='validated'||x.status==='skipped');
}

function isFieldEmpty(inv, key) {
  const raw=inv.data[key];
  return inv.status!=='pending'&&(raw==null||String(raw).trim()==='');
}

/* ══ TEST ENGINE ══ */

let totalPass=0, totalFail=0;

function eq(a, b) {
  return JSON.stringify(a) === JSON.stringify(b);
}

function runSuite(name, cases) {
  let pass=0, fail=0;
  const rows = cases.map(({desc, input, expected, fn}) => {
    const got = fn(input);
    const ok = eq(got, expected);
    if (ok) { pass++; totalPass++; } else { totalFail++; }
    return `<tr>
      <td>${desc}</td>
      <td class="input">${JSON.stringify(input)}</td>
      <td class="expected">${JSON.stringify(expected)}</td>
      <td class="got ${ok?'ok':'ko'}">${JSON.stringify(got)}</td>
      <td><span class="badge ${ok?'pass':'fail'}">${ok?'✓ PASS':'✗ FAIL'}</span></td>
    </tr>`;
  }).join('');

  return `<div class="suite">
    <div class="suite-head">
      <span class="suite-name">${name}</span>
      <span class="suite-score">${pass} / ${pass+fail} passed</span>
    </div>
    <table>
      <thead><tr><th>Description</th><th>Entrée</th><th>Attendu</th><th>Obtenu</th><th>Résultat</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ══ DUPLICATE DETECTION LOGIC (same as app) ══ */
function detectDuplicates(existingNames, newNames) {
  const duplicates=[];
  const added=[];
  newNames.forEach(name=>{
    if(existingNames.includes(name)||added.includes(name)) duplicates.push(name);
    else added.push(name);
  });
  return {duplicates, added};
}

/* ══ PRE-EXPORT LOGIC (same as app) ══ */
function canShowFinishButton(invoices) {
  if (!invoices.length) return false;
  return invoices.every(x => x.status === 'validated' || x.status === 'skipped');
}

function shouldWarnBeforeExport(invoices) {
  return invoices.some(x => x.status === 'skipped');
}

function getSkippedInvoices(invoices) {
  return invoices.filter(x => x.status === 'skipped').map(x => x.file.name);
}

function buildExportWarningMessage(invoices) {
  const skipped = getSkippedInvoices(invoices);
  if (!skipped.length) return null;
  return {
    count: skipped.length,
    names: skipped,
    message: `${skipped.length} facture${skipped.length > 1 ? 's' : ''} ignorée${skipped.length > 1 ? 's' : ''} ${skipped.length > 1 ? 'ne seront' : 'ne sera'} pas exportée${skipped.length > 1 ? 's' : ''}.`
  };
}

/* ══ NEW LOGIC: checkFields, onFI status reset, button state ══ */

function checkFields(inv) {
  inv.errors = {}; let ok = true;
  FIELDS.forEach(f => {
    const v = inv.data[f.key], res = vandn(v, f);
    if (!res.valid) { inv.errors[f.key] = res.errs[0]; ok = false; }
    else if (res.norm !== v && res.norm != null) inv.data[f.key] = res.norm;
  });
  return ok;
}

function makeInvoice(status, data={}) {
  return { file:{name:'test.pdf'}, status, data:{...data}, errors:{}, rawNorm:{}, confidence:null };
}

function simulateOnFI(inv, key, val) {
  inv.data[key] = val;
  if (inv.errors) delete inv.errors[key];
  if (inv.status === 'skipped' || inv.status === 'validated') inv.status = 'extracted';
  return inv;
}

function getButtonLabel(inv, invoices) {
  const allDone = invoices.length > 0 && invoices.every(x => x.status === 'validated' || x.status === 'skipped');
  const currentValidated = inv.status === 'validated';
  return (allDone && currentValidated) ? 'Terminer et exporter ✓' : 'Valider ✓';
}

function simulatePreExportCheck(inv, invoices) {
  const ok = checkFields(inv);
  if (!ok) return { blocked: true, reason: 'missing_fields', errors: inv.errors };
  const skipped = invoices.filter(x => x.status === 'skipped');
  if (skipped.length) return { blocked: true, reason: 'skipped_warning', skipped: skipped.map(x => x.file.name) };
  return { blocked: false };
}

/* ══ CSV & ZIP OUTPUT LOGIC ══ */
function snName(s){return s.replace(/[\/\\:*?"<>|]/g,'').replace(/\s+/g,'_').slice(0,80);}

function getPdfFilename(inv){
  const num=inv.data['invoice_number'];
  return (num&&String(num).trim())?snName(String(num))+'.pdf':snName(inv.file.name);
}

function buildCSVContent(invoices,fields){
  const validated=invoices.filter(i=>i.status==='validated');
  const header=fields.map(f=>`"${f.label}"`).join(',');
  const rows=validated.map(inv=>fields.map(f=>{const v=inv.data[f.key]??'';return'"'+String(v).replace(/"/g,'""')+'"';}).join(','));
  return [header,...rows].join('\n');
}

function getZipContents(invoices,fields){
  const validated=invoices.filter(i=>i.status==='validated');
  return{csvFilename:'factures.csv',csvContent:buildCSVContent(invoices,fields),pdfs:validated.map(inv=>({filename:getPdfFilename(inv),originalName:inv.file.name}))};
}

/* ══ PROXY VALIDATION LOGIC (mirrored from api/extract.js) ══ */

function validateProxyMethod(method) {
  if (method !== 'POST') return { status: 405, error: 'Method not allowed' };
  return null;
}

function validateApiKeyPresence(key) {
  if (!key) return { status: 500, error: 'API key not configured on server' };
  return null;
}

/* ══ APP-SIDE: extract button disabled state ══ */

function isExtractButtonDisabled(pending, busy) {
  return pending === 0 || busy;
}

/* ══ APP-SIDE: Claude request body builder ══ */

function buildClaudeRequestBody(b64, prompt) {
  return {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1000,
    messages: [{
      role: 'user',
      content: [
        {type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}},
        {type:'text', text:prompt}
      ]
    }]
  };
}

// Mirror of debtor_is_company logic from buildCSV() in invoice-processor.html (line 1167)
function getDebtorIsCompanyValue(debtorType) {
  return debtorType === 'entreprise';
}

// Mirror of buildCSV() limited to a given schema — same special-case logic as the main app
function buildCSVForSchema(invoices, schema) {
  const validated = invoices.filter(i => i.status === 'validated');
  const header = schema.map(k => `"${k}"`).join(';');
  const rows = validated.map(inv => schema.map(k => {
    let v;
    if (k === 'debtor_is_company') v = inv.debtorType === 'entreprise';
    else v = inv.data[k];
    v = v ?? '';
    return '"' + String(v).replace(/"/g, '""') + '"';
  }).join(';'));
  return [header, ...rows].join('\n');
}

// Mirror of sha256 from admin.html (sync wrapper for test purposes)
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function isAdminAuthenticated(storage) {
  return storage.getItem('adminAuth') === '1';
}

function getSettingsButtonDisplay(isAdmin) {
  return isAdmin ? '' : 'none';
}
